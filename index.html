<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자리배치</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaPHd6cCyp3Yuzx+RbvYJyfsJTeWY5Avzkdxl3pNGdisz8Iky3Uczdlz7YT1Do1B4ezgmO6ijLJrVN0XLOQ8g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1 class="app-title">자리배치</h1>
        <div class="control-panel" aria-label="자리배치 컨트롤 패널">
          <div class="control-buttons">
            <button type="button" data-action="shuffle" class="btn primary">랜덤 섞기</button>
            <button type="button" data-action="reset" class="btn">전체 리셋</button>
            <button type="button" data-action="save-png" class="btn">PNG로 저장</button>
            <button type="button" data-action="export-json" class="btn">JSON 내보내기</button>
            <button type="button" data-action="import-json" class="btn">JSON 불러오기</button>
          </div>
          <label class="toggle" for="toggle-empty-view">
            <input type="checkbox" id="toggle-empty-view" />
            <span>빈 자리 보기(고유번호 표시)</span>
          </label>
          <input type="file" id="json-import-input" accept="application/json" hidden />
        </div>
      </header>
      <main class="main-layout">
        <div class="sections-area">
          <section class="teacher-area" aria-labelledby="teacher-label">
            <h2 id="teacher-label" class="section-heading">교탁</h2>
            <div class="teacher-desk" data-seat-id="T0"></div>
          </section>
          <section class="sections-container" aria-label="학생 자리">
            <!-- sections will be rendered here -->
          </section>
        </div>
      </main>
      <footer class="app-footer">
        <p>도움말: 좌석 이미지를 클릭하거나 드래그하여 업로드하세요. 페어 핸들을 드래그하면 순서를 바꿀 수 있습니다.</p>
      </footer>
    </div>
    <input type="file" accept="image/png,image/jpeg,image/jpg,image/gif" id="seat-image-input" hidden />
    <script src="app.js"></script>
  </body>
</html>
